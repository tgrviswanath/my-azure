# Project 05 — GitHub Actions CI/CD Pipeline for Azure
# .github/workflows/deploy.yml

name: CI/CD — Deploy to Azure

on:
  push:
    branches: [main, develop, 'release/**']
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '18'
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE_NAME: myapp

jobs:
# ══════════════════════════════════════════════════════════════════════════════
# JOB 1: Lint & Test
# ══════════════════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Unit tests
      run: npm test -- --coverage --ci --reporters=default --reporters=jest-junit
      env:
        CI: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          junit.xml
          coverage/

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

# ══════════════════════════════════════════════════════════════════════════════
# JOB 2: Security Scan
# ══════════════════════════════════════════════════════════════════════════════
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: npm audit
      run: npm audit --audit-level=high
      continue-on-error: true

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy-results.sarif
        severity: HIGH,CRITICAL

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-results.sarif

# ══════════════════════════════════════════════════════════════════════════════
# JOB 3: Build & Push Container
# ══════════════════════════════════════════════════════════════════════════════
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix=sha-
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Build and push
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          GIT_COMMIT=${{ github.sha }}
          APP_VERSION=${{ github.ref_name }}

    - name: Scan container image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
        format: table
        exit-code: 1
        severity: CRITICAL

# ══════════════════════════════════════════════════════════════════════════════
# JOB 4: Deploy to Staging
# ══════════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    environment:
      name: staging
      url: https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net
    steps:
    - uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to staging slot
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: staging
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

    - name: Run smoke tests
      run: |
        STAGING_URL="https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net"
        echo "Testing: $STAGING_URL"
        for i in {1..10}; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health")
          if [ "$STATUS" == "200" ]; then
            echo "✅ Staging health check passed"
            exit 0
          fi
          echo "Attempt $i: HTTP $STATUS"
          sleep 15
        done
        echo "❌ Staging health check failed"
        exit 1

    - name: Run integration tests
      run: |
        STAGING_URL="https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net"
        npm run test:integration -- --baseUrl="$STAGING_URL" || true
      continue-on-error: true

# ══════════════════════════════════════════════════════════════════════════════
# JOB 5: Deploy to Production
# ══════════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: 🏭 Deploy Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
    steps:
    - uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Swap staging to production
      uses: azure/CLI@v1
      with:
        azcliversion: latest
        inlineScript: |
          az webapp deployment slot swap \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --slot staging \
            --target-slot production

    - name: Production health check
      id: health-check
      run: |
        PROD_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        echo "Verifying production: $PROD_URL"
        for i in {1..15}; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health")
          if [ "$STATUS" == "200" ]; then
            echo "✅ Production health check passed (attempt $i)"
            echo "status=success" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Attempt $i: HTTP $STATUS"
          sleep 15
        done
        echo "❌ Production health check FAILED"
        echo "status=failed" >> $GITHUB_OUTPUT
        exit 1

    - name: Rollback on failure
      if: failure() && steps.health-check.outputs.status == 'failed'
      uses: azure/CLI@v1
      with:
        azcliversion: latest
        inlineScript: |
          echo "🔄 Rolling back production..."
          az webapp deployment slot swap \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --slot staging \
            --target-slot production
          echo "✅ Rollback complete"

    - name: Create GitHub Release
      if: success()
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          ## Changes
          ${{ github.event.head_commit.message }}

          ## Deployment
          - Image: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}`
          - Deployed: ${{ github.event.head_commit.timestamp }}
          - Commit: ${{ github.sha }}
        draft: false
        prerelease: false

# ══════════════════════════════════════════════════════════════════════════════
# JOB 6: Notify
# ══════════════════════════════════════════════════════════════════════════════
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [test, security, build, deploy-staging, deploy-production]
    if: always()
    steps:
    - name: Send Teams notification
      uses: jdcargile/ms-teams-notification@v1.4
      if: vars.TEAMS_WEBHOOK_URL != ''
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        ms-teams-webhook-uri: ${{ vars.TEAMS_WEBHOOK_URL }}
        notification-summary: |
          ${{ needs.deploy-production.result == 'success' && '✅ Deployed to production' || '❌ Deployment failed' }}
        notification-color: ${{ needs.deploy-production.result == 'success' && '28a745' || 'dc3545' }}
        timezone: America/New_York
