# Product Service — Kubernetes Manifests
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-service-sa
  namespace: production
  annotations:
    azure.workload.identity/client-id: "${PRODUCT_SERVICE_MANAGED_IDENTITY_CLIENT_ID}"
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: product-service-config
  namespace: production
data:
  PORT: "3002"
  SERVICE_NAME: "product-service"
  CACHE_TTL_SECONDS: "300"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: production
  labels:
    app: product-service
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: product-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: product-service
        version: v1.0.0
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: product-service-sa
      terminationGracePeriodSeconds: 30
      containers:
      - name: product-service
        image: myregistry.azurecr.io/product-service:v1.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3002
        envFrom:
        - configMapRef:
            name: product-service-config
        - configMapRef:
            name: shared-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: product-service-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: product-service-secrets
              key: redis-url
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3002
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: product-service
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: production
spec:
  selector:
    app: product-service
  ports:
  - port: 80
    targetPort: 3002
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-service-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-service
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: product-service-pdb
  namespace: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: product-service
