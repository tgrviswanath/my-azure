apiVersion: apps/v1
kind: Deployment
metadata:
  name: handson-api
  namespace: handson
  labels:
    app: handson-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: handson-api
  template:
    metadata:
      labels:
        app: handson-api
    spec:
      containers:
      - name: api
        image: acrgitopshandson001.azurecr.io/handson-api:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: handson-api
  namespace: handson
spec:
  selector:
    app: handson-api
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
