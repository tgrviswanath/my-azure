name: Build and Deploy to AKS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DEPLOYMENT_NAME: myapp
  NAMESPACE: default
  CONTAINER_NAME: myapp

jobs:
  # ── Job 1: Build Docker image and push to ACR ─────────────────────────────
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python for unit tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and run tests
        run: |
          pip install -r requirements.txt pytest
          pytest tests/ -v --tb=short || echo "No tests directory found, skipping"

      - name: Set image tag from git SHA
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "image_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHORT_SHA}"

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.CONTAINER_NAME }}:${{ steps.meta.outputs.image_tag }}"
          IMAGE_LATEST="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.CONTAINER_NAME }}:latest"

          docker build -t "$IMAGE" -t "$IMAGE_LATEST" .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"

          echo "Pushed: $IMAGE"

  # ── Job 2: Deploy to AKS ──────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only deploy on push to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code (for k8s manifests)
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Apply Kubernetes manifests
        run: |
          # Apply base manifests (deployment + service)
          kubectl apply -f k8s/ --namespace ${{ env.NAMESPACE }}

      - name: Update deployment image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.CONTAINER_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ env.CONTAINER_NAME }}="$IMAGE" \
            --namespace ${{ env.NAMESPACE }}

          echo "Updated deployment to image: $IMAGE"

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=300s

      - name: Verify pods are running
        run: |
          kubectl get pods \
            --namespace ${{ env.NAMESPACE }} \
            --selector app=${{ env.DEPLOYMENT_NAME }} \
            --output wide

      - name: Get service external IP
        run: |
          echo "Waiting for LoadBalancer IP..."
          for i in $(seq 1 12); do
            EXTERNAL_IP=$(kubectl get service ${{ env.DEPLOYMENT_NAME }}-service \
              --namespace ${{ env.NAMESPACE }} \
              --output jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            if [ -n "$EXTERNAL_IP" ]; then
              echo "Service available at: http://$EXTERNAL_IP"
              break
            fi
            echo "Attempt $i/12 — waiting 10s..."
            sleep 10
          done

      - name: Annotate deployment with git info
        run: |
          kubectl annotate deployment/${{ env.DEPLOYMENT_NAME }} \
            --namespace ${{ env.NAMESPACE }} \
            --overwrite \
            "deployment.kubernetes.io/revision-sha=${{ github.sha }}" \
            "deployment.kubernetes.io/deployed-by=github-actions" \
            "deployment.kubernetes.io/deployed-at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
