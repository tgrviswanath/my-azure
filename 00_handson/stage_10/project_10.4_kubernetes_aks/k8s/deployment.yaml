apiVersion: v1
kind: Namespace
metadata:
  name: handson
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: handson-api
  namespace: handson
spec:
  replicas: 2
  selector:
    matchLabels:
      app: handson-api
  template:
    metadata:
      labels:
        app: handson-api
    spec:
      containers:
      - name: api
        image: acrhandsonprod001.azurecr.io/handson-api:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: handson-api
  namespace: handson
spec:
  selector:
    app: handson-api
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: handson-api
  namespace: handson
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: handson-api
            port:
              number: 80
      - path: /health
        pathType: Exact
        backend:
          service:
            name: handson-api
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: handson-api
  namespace: handson
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: handson-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
