name: 'orders_pipeline'
version: '1.0.0'
config-version: 2

profile: 'orders_pipeline'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Model configurations by directory
models:
  orders_pipeline:
    # Staging: lightweight views, no storage cost
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]

    # Intermediate: tables for complex joins/enrichment
    intermediate:
      +materialized: table
      +schema: intermediate
      +tags: ["intermediate"]
      +dist: hash
      +sort: order_date

    # Marts: final aggregated tables for BI
    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts", "production"]
      +dist: hash
      +sort: order_date

# Variable defaults (override with --vars on CLI)
vars:
  execution_date: "{{ run_started_at.strftime('%Y-%m-%d') }}"
  lookback_days: 7

# Packages
packages:
  - package: dbt-labs/dbt_utils
    version: [">=1.0.0", "<2.0.0"]
