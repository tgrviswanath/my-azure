name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"

# Prevent concurrent plans on the same PR
concurrency:
  group: terraform-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # Required to post PR comments

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_STATE_STORAGE:    ${{ secrets.TF_STATE_STORAGE_ACCOUNT }}

    defaults:
      run:
        working-directory: terraform/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: true  # Enables terraform output capture

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="storage_account_name=$TF_STATE_STORAGE" \
            -backend-config="resource_group_name=rg-tfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=project-3.5/terraform.tfstate"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Delete previous plan comments
            const botComments = comments.filter(comment =>
              comment.user.type === 'Bot' && comment.body.includes('Terraform Plan')
            );
            for (const comment of botComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
            }

            const fmtOutcome = '${{ steps.fmt.outcome }}';
            const initOutcome = '${{ steps.init.outcome }}';
            const validateOutcome = '${{ steps.validate.outcome }}';
            const planOutcome = '${{ steps.plan.outcome }}';

            const output = `## Terraform Plan 🚀

            | Step | Status |
            |------|--------|
            | Format | ${fmtOutcome === 'success' ? '✅' : '❌'} \`${fmtOutcome}\` |
            | Init | ${initOutcome === 'success' ? '✅' : '❌'} \`${initOutcome}\` |
            | Validate | ${validateOutcome === 'success' ? '✅' : '❌'} \`${validateOutcome}\` |
            | Plan | ${planOutcome === 'success' ? '✅' : '⚠️'} \`${planOutcome}\` |

            <details><summary>Show Plan Output</summary>

            \`\`\`hcl
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output,
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
